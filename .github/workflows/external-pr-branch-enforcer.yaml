name: External PR Branch Enforcer

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  check-target-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Event
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "PR base ref: ${{ github.event.pull_request.base.ref }}"
          echo "Author association: ${{ github.event.pull_request.author_association }}"
          echo "PR author: ${{ github.event.pull_request.user.login }}"
          echo "Repo owner: ${{ github.repository_owner }}"

      - name: Check PR target branch
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('Starting PR check...');
            const pr = context.payload.pull_request;
            
            console.log('PR Details:', {
              base: pr.base.ref,
              author: pr.author_association,
              prAuthor: pr.user.login,
              repoOwner: context.repo.owner,
              number: pr.number
            });
            
            if (pr.base.ref !== 'develop') {
              try {
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: pr.number,
                  body: '🤖 Attention! Always use the develop branch for your PRs instead of ' + pr.base.ref + '.' 
                });
                
                await github.rest.pulls.update({
                  ...context.repo,
                  pull_number: pr.number,
                  base: 'develop'
                });
                
                console.log('Successfully updated PR target branch');
              } catch (error) {
                console.error('Error:', error);
                throw error;
              }
            } else {
              console.log('No action needed: PR is already targeting develop');
            }